name: ntt_data
description: "A new Flutter project."

publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  flutter_screenutil: ^5.9.3
  get: ^4.7.2
  fluttertoast: ^8.2.12
  flutter_onboarding_slider: ^1.0.11
  camera: ^0.11.1
  dotted_border: ^2.1.0
  get_storage: ^2.1.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  date_picker_plus: ^4.1.0
  image_picker: ^1.1.2
  lottie: ^3.3.1
  pinput: ^5.0.1
  http: ^1.3.0
  encrypt: ^5.0.3
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
flutter:

  uses-material-design: true

  assets:
      - assets/images/png/
      - assets/images/svg/
      - assets/images/lottie/
