name: ntt_data
description: "A new Flutter project."

publish_to: 'none' 
version: 1.0.7+8

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  biosensesignal_flutter_sdk:
    path: ./biosensesignalsdk

  cupertino_icons: ^1.0.2
  permission_handler: ^11.0.1
  focus_detector: ^2.0.1
  wakelock_plus: ^1.2.8
  provider: ^6.0.1
  

  flutter_screenutil: ^5.9.3
  get: ^4.7.2
  fluttertoast: ^8.2.12
  flutter_onboarding_slider: ^1.0.11
  camera: ^0.11.1
  dotted_border: ^2.1.0
  get_storage: ^2.1.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.3.1
  date_picker_plus: ^4.1.0
  image_picker: ^1.1.2
  lottie: ^3.3.1
  pinput: ^5.0.1
  http: ^1.3.0
  encrypt: ^5.0.3
  mime: ^1.0.4
  percent_indicator: ^4.2.5
  shimmer_animation: ^2.2.2
  shared_preferences: ^2.5.3
  flutter_animation_progress_bar: ^2.3.1
  connectivity_plus: ^6.1.4
  shimmer: ^3.0.0
  bottom_picker: ^3.2.1
  time_picker_spinner_pop_up: ^2.0.0
  flutter_holo_date_picker: ^2.0.0
  awesome_datetime_picker: ^0.1.1
  flutter_launcher_icons: ^0.14.4
  flutter_html: ^3.0.0-beta.2
  battery_plus: ^6.2.2
  math_expressions: ^3.0.0
  flutter_widget_from_html: ^0.16.1
  fl_chart: ^1.0.0
  custom_date_range_picker: ^1.1.0
  date_ranger: ^1.1.0
  # flutter_secure_storage: ^4.2.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  change_app_package_name: ^1.5.0
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/png/app-logo.png" # Your icon path
  adaptive_icon_background: "#FFFFFF"    # Optional for Android adaptive icons
  adaptive_icon_foreground: "assets/images/png/app-logo.png"
dependency_overrides:
  wakelock_windows: any
  win32: any
flutter:

  uses-material-design: true

  assets:
      - assets/images/
      - assets/images/svg/
      - assets/images/png/
      - assets/images/lottie/
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

