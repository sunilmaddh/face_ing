name: ntt_data
description: "A new Flutter project."

publish_to: 'none' 
version: 1.0.7+8

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  biosensesignal_flutter_sdk:
    path: ./biosensesignalsdk

  cupertino_icons: ^1.0.2
  permission_handler: ^12.0.1
  focus_detector: ^2.0.1
  wakelock_plus: ^1.4.0
