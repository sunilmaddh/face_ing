  flutter_svg: ^2.0.17
  cached_network_image: ^3.3.1
  date_picker_plus: ^7.0.0
  image_picker: ^1.1.2
  lottie: ^3.3.1
  pinput: ^6.0.2
  http: ^1.3.0
  encrypt: ^5.0.3
  mime: ^2.0.0
  percent_indicator: ^4.2.5
  shimmer_animation: ^2.2.2
  shared_preferences: ^2.5.3
  flutter_animation_progress_bar: ^2.3.1
  connectivity_plus: ^7.1.1
