dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/png/app-logo.png" # Your icon path
  adaptive_icon_background: "#FFFFFF"    # Optional for Android adaptive icons
  adaptive_icon_foreground: "assets/images/png/app-logo.png"
dependency_overrides:
  wakelock_windows: any
  win32: 5.13.0
flutter:

  uses-material-design: true

  assets:
      - assets/images/
      - assets/audio/
      - assets/images/svg/
      - assets/images/png/
      - assets/images/lottie/
      - assets/audio/voice_agent_fixed.wav
